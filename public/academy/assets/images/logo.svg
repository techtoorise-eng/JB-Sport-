<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Fiery High-Velocity Sports Orange/Gold Gradient -->
    <linearGradient id="sportsOrange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1E00" />
      <stop offset="50%" stop-color="#FF6A00" />
      <stop offset="100%" stop-color="#FFB300" />
    </linearGradient>

    <!-- Deep Elite Galactic Navy Gradient -->
    <linearGradient id="eliteNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050C1F" />
      <stop offset="60%" stop-color="#0D2353" />
      <stop offset="100%" stop-color="#193D8A" />
    </linearGradient>

    <!-- Metallic Premium White Highlight Gradient -->
    <linearGradient id="silverGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#C2D1E6" />
    </linearGradient>

    <!-- Custom dynamic glow/shadow filters for sporty projection -->
    <filter id="athleticGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#FF4F00" flood-opacity="0.3" />
    </filter>
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#050C1F" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Ground Shadow / Base -->
  <ellipse cx="250" cy="470" rx="140" ry="12" fill="#050C1F" opacity="0.25" />

  <!-- Shield Base Group with Shadow -->
  <g id="MasterCrest" filter="url(#shieldShadow)">
    
    <!-- 1. Outer Heavy Athletic Border (Octagonal/Shield Shape) -->
    <path d="M 250, 40 
             L 420, 80 
             L 420, 250 
             C 420, 360 340, 430 250, 460 
             C 160, 430 80, 360 80, 250 
             L 80, 80 
             Z" 
          fill="url(#eliteNavy)" 
          stroke="url(#sportsOrange)" 
          stroke-width="14" 
          stroke-linejoin="round" />

    <!-- 2. Inner Elegant Metallic Contour Stripe -->
    <path d="M 250, 62 
             L 396, 96 
             L 396, 246 
             C 396, 342 328, 406 250, 433 
             C 172, 406 104, 342 104, 246 
             L 104, 96 
             Z" 
          fill="none" 
          stroke="url(#silverGloss)" 
          stroke-width="4" 
          stroke-linejoin="round" 
          opacity="0.75" />

    <!-- 3. Side Speed Chevrons / Aerodynamic Wing Flares (Sporty Dynamics) -->
    <!-- Left Wing -->
    <path d="M 60, 110 L 100, 150 L 100, 230 L 50, 160 Z" fill="url(#sportsOrange)" opacity="0.85" />
    <path d="M 46, 150 L 80, 185 L 80, 250 L 36, 195 Z" fill="url(#sportsOrange)" opacity="0.6" />
    <path d="M 32, 190 L 60, 220 L 60, 270 L 22, 230 Z" fill="url(#sportsOrange)" opacity="0.35" />

    <!-- Right Wing -->
    <path d="M 440, 110 L 400, 150 L 400, 230 L 450, 160 Z" fill="url(#sportsOrange)" opacity="0.85" />
    <path d="M 454, 150 L 420, 185 L 420, 250 L 464, 195 Z" fill="url(#sportsOrange)" opacity="0.6" />
    <path d="M 468, 190 L 440, 220 L 440, 270 L 478, 230 Z" fill="url(#sportsOrange)" opacity="0.35" />

    <!-- 4. Top Championship Crown Stars -->
    <g fill="url(#silverGloss)">
      <!-- Center Main Star -->
      <polygon points="250,12 255,24 268,24 258,32 261,44 250,36 239,44 242,32 232,24 245,24" />
      <!-- Left Star -->
      <polygon points="200,24 204,33 214,33 206,39 209,49 200,43 191,49 194,39 186,33 196,33" opacity="0.8"/>
      <!-- Right Star -->
      <polygon points="300,24 304,33 314,33 306,39 309,49 300,43 291,49 294,39 286,33 296,33" opacity="0.8"/>
    </g>

    <!-- 5. Central Graphic: Stylized Soaring Champion / Victory Wings & Sharp Ball -->
    <g filter="url(#athleticGlow)">
      <!-- Central Athletic Flame Shield / Inner Emblem Background -->
      <path d="M 250, 120 
               C 290, 160 320, 210 320, 280 
               C 320, 340 290, 360 250, 390 
               C 210, 360 180, 340 180, 280 
               C 180, 210 210, 160 250, 120 Z" 
            fill="url(#sportsOrange)" 
            opacity="0.1" />

      <!-- High-Performance Ribbon "V" Swoosh inside -->
      <path d="M 140, 170 
               C 180, 280 210, 360 250, 385 
               C 290, 360 320, 280 360, 170
               C 310, 240 280, 300 250, 335
               C 220, 300 190, 240 140, 170 Z" 
            fill="url(#sportsOrange)" />

      <!-- Heroic Leaping Figure Vector in Central Space -->
      <!-- Dynamic Arms and Head -->
      <circle cx="250" cy="170" r="14" fill="url(#silverGloss)" />
      
      <!-- Upper Torso & Outspread Soaring Arms -->
      <path d="M 250, 185
               C 225, 195 185, 205 155, 195
               C 150, 193 148, 202 154, 208
               C 185, 230 220, 225 250, 215
               C 280, 225 315, 230 346, 208
               C 352, 202 350, 193 345, 195
               C 315, 205 275, 195 250, 185 Z" 
            fill="url(#silverGloss)" />

      <!-- Sculpted Dynamic Torso, Hips & Fast Leaping Legs -->
      <path d="M 242, 210
               L 258, 210
               L 265, 265
               L 295, 310
               C 298, 315 292, 320 286, 315
               L 250, 275
               L 214, 315
               C 208, 320 202, 315 205, 310
               L 235, 265
               Z" 
            fill="url(#silverGloss)" />

      <!-- Bold Dynamic Lightning Accents or "J" / "B" Speed Swirls -->
      <path d="M 210, 160 C 235, 150 265, 150 290, 160 C 298, 163 294, 172 288, 170 C 265, 162 235, 162 212, 170 C 206, 172 202, 163 210, 160 Z" fill="url(#sportsOrange)" />
    </g>

    <!-- 6. Ribbon Plate / Banner at the base of the Shield -->
    <path d="M 160, 365 
             L 340, 365 
             L 360, 405 
             L 250, 425 
             L 140, 405 
             Z" 
          fill="url(#eliteNavy)" 
          stroke="url(#sportsOrange)" 
          stroke-width="5" 
          stroke-linejoin="round" />

    <!-- 5 Stars representing Championship quality inside the footer-banner -->
    <g fill="url(#sportsOrange)">
      <polygon points="250,380 252,386 258,386 253,390 255,396 250,392 245,396 247,390 242,386 248,386" />
      <polygon points="220,382 222,388 228,388 223,392 225,398 220,394 215,398 217,392 212,388 218,388" />
      <polygon points="280,382 282,388 288,388 283,392 285,398 280,394 275,398 277,392 272,388 278,388" />
      <polygon points="190,385 192,391 198,391 193,395 195,401 190,397 185,401 187,395 182,391 188,391" />
      <polygon points="310,385 312,391 318,391 313,395 315,401 310,397 305,401 307,395 302,391 308,391" />
    </g>
    
  </g>
</svg>
